  // 返回列表功能
  function goBack() {
    window.history.back();
    // 备选：window.location.href = "index.html";
  }

  // 解析URL参数
  function getUrlParam(paramName) {
    const searchParams = new URLSearchParams(window.location.search);
    return searchParams.get(paramName);
  }

  // 渲染详情（核心：动态生成1-2张图片）
  window.onload = function() {
    const pubTitle = getUrlParam('title');
    const container = document.getElementById('detailContainer');
    const targetPub = newsDetails.find(pub => pub.title === pubTitle);

    if (targetPub) {
      // 1. 处理正文：将换行符转为<p>标签（更贴近示例网页的段落排版）
      const contentParagraphs = targetPub.content
        .split(/\n\n+/) // 按空行分割成段落
        .filter(para => para.trim() !== "") // 过滤空段落
        .map(para => `<p>${para.replace(/\n/g, '')}</p>`) // 移除行内换行，包裹<p>
        .join('');

      // 2. 生成图片HTML（支持1-2张）
      let imgHtml = '';
      if (targetPub.imgUrls && targetPub.imgUrls.length > 0) {
        imgHtml = '<div class="img-container">';
        targetPub.imgUrls.forEach((imgUrl, index) => {
          imgHtml += `<img src="${imgUrl}" alt="Article Image ${index+1}" class="detail-img">`;
        });
        imgHtml += '</div>';
      }

      // 3. 拼接完整HTML
      container.innerHTML = `
                    <h1 class="detail-title">${targetPub.title}</h1>
                    <span class="detail-date">Release Time: ${targetPub.date}</span>
                    ${imgHtml} <!-- 动态插入图片（1-2张） -->
                    <div class="detail-content">${contentParagraphs}</div>
                `;
    } else {
      container.innerHTML = `
                    <div class="not-found">
                        <h3>News Not Found</h3>
                        <p>Please return to the list and try again.</p>
                    </div>
                `;
    }
  };
